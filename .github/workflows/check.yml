---
name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install nix
        uses: cachix/install-nix-action@v31
      - name: Setup cachix
        uses: cachix/cachix-action@v17
        with:
          name: neorocks
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run lx check
        run: |
          pushd scripts
          nix develop .# --accept-flake-config --command \
            lx check --warnings-as-errors
          popd
      - name: Dry-run CLI reference generator
        run: scripts/src/generate-cli-reference.lua
      - name: Dry-run Lua API reference generator
        run: scripts/src/generate-lua-api-reference.lua
